services:
  # Base de Datos Relacional
  db:
    image: postgres:15-alpine
    container_name: arriendos360_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tu_contraseña
      POSTGRES_DB: arriendos360_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # Servidor Backend
  backend:
    build: ./backend
    container_name: arriendos360_api
    command: sh -c "npm install && npx nodemon -L src/app.js"
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=tu_contraseña
      - DB_NAME=arriendos360_db
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Aplicación Frontend
  frontend:
    build: ./frontend
    container_name: arriendos360_ui
    command: sh -c "npm install && npx react-scripts start"
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data: