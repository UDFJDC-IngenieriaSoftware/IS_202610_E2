name: Deploy Backend to Azure

on:
  push:
    branches:
      - jdiaz3
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: arriendos360_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Run Tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: postgres123
          DB_NAME: arriendos360_test
          DB_PORT: 5432
          JWT_SECRET: arriendos360_secret_key_2026

      - name: Check Secrets
        run: |
          if [ -z "${{ secrets.REGISTRY_LOGIN_SERVER }}" ]; then echo "❌ REGISTRY_LOGIN_SERVER is missing"; else echo "✅ REGISTRY_LOGIN_SERVER is set"; fi
          if [ -z "${{ secrets.REGISTRY_USERNAME }}" ]; then echo "❌ REGISTRY_USERNAME is missing"; else echo "✅ REGISTRY_USERNAME is set"; fi
          if [ -z "${{ secrets.REGISTRY_PASSWORD }}" ]; then echo "❌ REGISTRY_PASSWORD is missing"; else echo "✅ REGISTRY_PASSWORD is set"; fi
          if [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ]; then echo "❌ AZURE_WEBAPP_PUBLISH_PROFILE is missing"; else echo "✅ AZURE_WEBAPP_PUBLISH_PROFILE is set"; fi

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push container image to ACR
        run: |
          docker build ./backend -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/arriendos360-backend:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/arriendos360-backend:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'arriendos360-api'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ secrets.REGISTRY_LOGIN_SERVER }}/arriendos360-backend:${{ github.sha }}'
